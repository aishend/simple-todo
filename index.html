<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task List</title>
</head>
<body>
  <main>
    <h1>Task List</h1>

    <form id="task-form">
      <div>
        <label for="task-title">Title</label>
        <input
          id="task-title"
          name="title"
          type="text"
          placeholder="Write the task title"
          aria-describedby="title-error"
        />
        <p id="title-error" aria-live="polite"></p>
      </div>

      <div>
        <label for="task-description">Description</label>
        <textarea
          id="task-description"
          name="description"
          placeholder="Write the task description"
        ></textarea>
      </div>

      <div>
        <label for="task-estimated-time">Estimated time</label>
        <input
          id="task-estimated-time"
          name="estimatedTime"
          type="number"
          min="1"
          placeholder="Minutes"
          aria-describedby="estimated-time-error"
        />
        <p id="estimated-time-error" aria-live="polite"></p>
      </div>

      <button type="submit">Add task</button>
    </form>

    <p id="empty-message">There are no tasks yet.</p>
    <ul id="task-list"></ul>
  </main>

  <script src="script.js"></script>
</body>
</html>
